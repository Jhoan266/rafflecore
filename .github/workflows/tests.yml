name: RaffleCore CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ["7.4", "8.0", "8.1", "8.2"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysqli, pdo_mysql, mbstring, intl
          tools: composer, phpunit
          coverage: none

      - name: Install WordPress Test Suite
        run: |
          bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest

      - name: Run PHP Syntax Check
        run: |
          find . -name "*.php" -not -path "./vendor/*" | xargs -I {} php -l {} | grep -v "No syntax errors"

      - name: Run PHPUnit Tests
        run: |
          cd tests && phpunit --configuration phpunit.xml --testdox

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: phpcs

      - name: Check PHP Coding Standards
        run: |
          phpcs --standard=WordPress --extensions=php --ignore=vendor,node_modules,tests . || true
